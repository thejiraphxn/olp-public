# Reverse proxy for the online-education app on port 443.
# IMPORTANT: make sure no other server block on this host already owns
# trsonline.mithat.co.th:443 — disable/remove it before reloading nginx,
# or nginx will refuse to start ("duplicate listen").
#
# Install:
#   sudo cp infra/nginx/trsonline-app.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/trsonline-app.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo ufw allow 443/tcp
#   # If 8443 was previously open and nothing else uses it:
#   sudo ufw delete allow 8443/tcp

server {
    server_name trsonline.mithat.co.th;
    listen 443 ssl http2;

    # Reuse the existing wildcard cert for *.mithat.co.th
    ssl_certificate     /var/www/ssl_start_mithat.co.th/nginx/star_mithat_co_th_combine.pem;
    ssl_certificate_key /var/www/ssl_start_mithat.co.th/nginx/private.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/trsonline-app-access.log;
    error_log  /var/log/nginx/trsonline-app-error.log warn;

    # Video uploads (MinIO multipart) can be GBs. Match what the rest of the
    # site allows, and stream upload chunks instead of buffering.
    client_max_body_size 10240M;
    client_body_buffer_size 128k;
    proxy_request_buffering off;

    # MinIO — presigned URLs come in as /<bucket>/<key>?X-Amz-...
    # SigV4 signs the path + Host, so forward both as-is. Don't add a path
    # prefix — that would break signature verification.
    location /olp-recordings/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Socket.IO — live class events + transcribe stream. Needs Upgrade for WS.
    # Goes STRAIGHT to the api container (port 4000 exposed on host loopback)
    # instead of through the Next.js standalone server — Next.js rewrites
    # don't reliably forward WebSocket Upgrade headers in production.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Same shortcut for /api/v1 — bypass Next.js rewrites and hit the API
    # directly for both HTTP and the keep-alive heartbeats.
    location /api/v1/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        # Multipart upload chunks via /complete can be ~25 MB.
        client_max_body_size 100M;
    }

    # Direct passthrough for liveness probes — used by external uptime
    # monitors and the GitHub Actions keep-alive ping.
    location = /health { proxy_pass http://127.0.0.1:4000; }
    location = /ping   { proxy_pass http://127.0.0.1:4000; }

    # Everything else → Next.js. Next.js rewrites /api + /socket.io internally
    # to api:4000 over the docker network.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
